# Deployment via Dokploy (Compose).
# IMPORTANT: do NOT also add a Domain in Dokploy's UI for this service — routing
# is done entirely by the Traefik labels below (a UI domain on the same host
# creates a duplicate router and breaks routing / the deploy).
# The container joins the shared dokploy-network so Traefik can reach it.
# The named volume keeps the SQLite DB and uploaded photos across redeploys.
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3000
      - DATA_DIR=/data
      # Passwortschutz auf öffentlicher Domain – in Dokploy unter Environment setzen.
      - APP_USER=${APP_USER:-escape}
      - APP_PASSWORD=${APP_PASSWORD:-}
    volumes:
      - escaperoom-data:/data
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # HTTPS (443)
      - traefik.http.routers.escaperoom.rule=Host(`tracker.escapr.net`)
      - traefik.http.routers.escaperoom.entrypoints=websecure
      - traefik.http.routers.escaperoom.tls=true
      - traefik.http.routers.escaperoom.tls.certresolver=letsencrypt
      - traefik.http.routers.escaperoom.service=escaperoom
      # HTTP (80)
      - traefik.http.routers.escaperoom-web.rule=Host(`tracker.escapr.net`)
      - traefik.http.routers.escaperoom-web.entrypoints=web
      - traefik.http.routers.escaperoom-web.service=escaperoom
      # target container port
      - traefik.http.services.escaperoom.loadbalancer.server.port=3000

volumes:
  escaperoom-data:

networks:
  dokploy-network:
    external: true
