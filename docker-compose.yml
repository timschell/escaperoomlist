# Deployment via Dokploy (Compose).
# Routing/HTTPS is handled by Dokploy's "Domains" UI (Service: app, Port: 3000),
# which injects the correct Traefik labels for this installation. We only need to
# join the shared dokploy-network so Traefik can reach the container.
# The named volume keeps the SQLite DB and uploaded photos across redeploys.
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3000
      - DATA_DIR=/data
      # Passwortschutz auf öffentlicher Domain – in Dokploy unter Environment setzen.
      - APP_USER=${APP_USER:-escape}
      - APP_PASSWORD=${APP_PASSWORD:-}
    volumes:
      - escaperoom-data:/data
    networks:
      - dokploy-network
    expose:
      - "3000"

volumes:
  escaperoom-data:

networks:
  dokploy-network:
    external: true
